services:
  postgres:
    image: postgres:16-alpine
    container_name: wild_beyond_db
    environment:
      POSTGRES_DB: wild_beyond
      POSTGRES_USER: wildbeyond
      POSTGRES_PASSWORD: wildbeyond123
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
