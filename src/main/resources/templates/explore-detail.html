<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${entry.name + ' | Explore | Wild Beyond'}">Explore Detail | Wild Beyond</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Titillium+Web:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { font-family: 'Titillium Web', sans-serif; }
        .super-title { font-family: 'Permanent Marker', cursive; }
        .brand-mark { font-family: 'Permanent Marker', cursive; letter-spacing: .02em; }
    </style>
</head>
<body class="bg-slate-100 text-slate-900 min-h-screen flex flex-col">
<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="flex-1">
    <section class="relative py-16 text-white bg-cover bg-center"
             th:style="|background-image: linear-gradient(rgba(2,6,23,.62), rgba(2,6,23,.78)), url('${entry.imageUrl}'); background-position: ${entry.imagePosition};|">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <a th:href="@{/explore}" class="inline-block text-sm font-semibold text-yellow-300 hover:underline">&larr; Back To Explore</a>
            <p class="mt-6 text-xs uppercase tracking-[0.22em] text-slate-200" th:text="${entry.category}">Category</p>
            <h1 class="super-title text-4xl md:text-6xl mt-2" th:text="${entry.name}">Entry Name</h1>
            <p class="mt-4 text-lg md:text-xl text-slate-100 max-w-4xl" th:text="${entry.shortDescription}"></p>
        </div>
    </section>

    <section class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
        <article class="bg-white border border-slate-200 shadow overflow-hidden">
              <img th:src="${entry.imageUrl}" th:alt="${entry.name}" class="w-auto max-w-full mx-auto h-auto max-h-[38rem] object-contain bg-slate-100"
                 th:style="|object-position: ${entry.imagePosition};|"
                 onerror="this.onerror=null;this.src='/images/lion.jpg';">

            <div class="p-6 md:p-8">
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div class="bg-slate-50 border border-slate-200 p-4">
                        <p class="text-xs uppercase tracking-wide text-slate-500">Habitat</p>
                        <p class="font-semibold text-slate-900 text-lg mt-1" th:text="${entry.habitat}"></p>
                    </div>
                    <div class="bg-slate-50 border border-slate-200 p-4">
                        <p class="text-xs uppercase tracking-wide text-slate-500">Conservation Status</p>
                        <p class="font-semibold text-slate-900 text-lg mt-1" th:text="${entry.conservationStatus}"></p>
                    </div>
                </div>

                <div class="mt-6 space-y-5 text-lg md:text-xl leading-relaxed text-slate-700">
                    <p th:text="${entry.detail}">Primary detail</p>
                    <p th:each="paragraph : ${entryNarrative}" th:text="${paragraph}">Expanded context</p>
                </div>

                <div class="mt-6 bg-emerald-50 border border-emerald-200 p-5">
                    <h2 class="text-2xl font-bold text-emerald-900">Why This Matters</h2>
                    <p class="mt-2 text-base md:text-lg text-emerald-900/90 leading-relaxed"
                       th:text="${entry.shortDescription}"></p>
                </div>

                <div class="mt-6">
                    <a th:href="${entry.sourceUrl}" target="_blank" rel="noopener noreferrer"
                       class="inline-block px-5 py-2.5 bg-emerald-700 text-white font-semibold hover:bg-emerald-600 transition">Read Source</a>
                </div>
            </div>
        </article>
    </section>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
