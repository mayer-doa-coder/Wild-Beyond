<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Product - Wild Beyond</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Titillium+Web:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { font-family: 'Titillium Web', sans-serif; }
        .super-title { font-family: 'Permanent Marker', cursive; }
        .brand-mark { font-family: 'Permanent Marker', cursive; letter-spacing: .02em; }
    </style>
</head>
<body class="bg-gray-100 text-gray-900 min-h-screen flex flex-col">
<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="flex-1 max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
    <div class="bg-white border border-gray-200 shadow overflow-hidden">
        <div class="bg-emerald-950 text-white px-6 py-4">
            <h1 class="text-2xl font-bold">Edit Product</h1>
        </div>

        <div class="p-6">
            <div class="mb-4 bg-red-50 border border-red-200 text-red-700 px-4 py-3 text-sm" th:if="${productCreateError}" th:text="${productCreateError}">
                Unable to update product.
            </div>

            <div class="mb-5" th:if="${productImageAvailable}">
                <img th:src="@{${productsBasePath + '/' + productId + '/photo'}}" alt="Product image" class="w-full h-56 object-cover border border-gray-200">
            </div>

            <form th:action="@{${productsBasePath + '/edit/' + productId}}" th:object="${product}" method="post" enctype="multipart/form-data" class="space-y-4">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <input type="hidden" th:field="*{sellerId}" />

                <div>
                    <label for="name" class="block text-sm font-semibold text-gray-700">Name</label>
                    <input id="name" type="text" th:field="*{name}" maxlength="100" required
                           class="mt-1 w-full border border-gray-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-emerald-700" />
                </div>

                <div>
                    <label for="description" class="block text-sm font-semibold text-gray-700">Description</label>
                    <textarea id="description" th:field="*{description}" maxlength="2000"
                              class="mt-1 w-full border border-gray-300 px-3 py-2 min-h-[140px] focus:outline-none focus:ring-2 focus:ring-emerald-700"></textarea>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label for="price" class="block text-sm font-semibold text-gray-700">Price</label>
                        <input id="price" type="number" min="0.01" step="0.01" th:field="*{price}" required
                               class="mt-1 w-full border border-gray-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-emerald-700" />
                    </div>

                    <div>
                        <label for="stock" class="block text-sm font-semibold text-gray-700">Stock</label>
                        <input id="stock" type="number" min="0" step="1" th:field="*{stock}" required
                               class="mt-1 w-full border border-gray-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-emerald-700" />
                    </div>
                </div>

                <div>
                    <label for="photo" class="block text-sm font-semibold text-gray-700">Upload Photo</label>
                    <input id="photo" name="photo" type="file" accept="image/*"
                           class="mt-1 w-full border border-gray-300 px-3 py-2 bg-white focus:outline-none focus:ring-2 focus:ring-emerald-700" />
                </div>

                <div class="flex flex-wrap gap-3 pt-1">
                    <button class="bg-emerald-900 text-white px-5 py-2 font-semibold hover:bg-emerald-800 transition" type="submit">Save Changes</button>
                    <a class="bg-slate-700 text-white px-5 py-2 font-semibold hover:bg-slate-600 transition" th:href="@{${productsBasePath + '/' + productId}}">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
