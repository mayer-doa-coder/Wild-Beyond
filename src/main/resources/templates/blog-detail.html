<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${post.title} + ' | Wild Beyond'">Blog | Wild Beyond</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-900 min-h-screen flex flex-col">
<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="flex-1 max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-14">
    <a th:href="@{/blog}" class="text-sm font-semibold text-emerald-700 hover:underline">Back to Blog</a>
    <article class="mt-4 bg-white shadow border border-gray-200 p-8">
        <h1 class="text-4xl font-bold text-emerald-900" th:text="${post.title}">Blog Title</h1>
        <p class="mt-3 text-xs uppercase tracking-[0.18em] text-gray-500"
           th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}">2026-01-01 10:00</p>
        <div class="mt-6 prose prose-gray max-w-none whitespace-pre-line" th:text="${post.content}">
            Blog content
        </div>
    </article>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
