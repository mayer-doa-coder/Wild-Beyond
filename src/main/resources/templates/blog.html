<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog | Wild Beyond</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Titillium+Web:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { font-family: 'Titillium Web', sans-serif; }
        .super-title { font-family: 'Permanent Marker', cursive; }
        .brand-mark { font-family: 'Permanent Marker', cursive; letter-spacing: .02em; }
    </style>
</head>
<body class="bg-gray-100 text-gray-900 min-h-screen flex flex-col">
<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="flex-1">
    <section class="relative py-16 text-white bg-cover bg-center"
             style="background-image: linear-gradient(rgba(2,6,23,.55), rgba(2,6,23,.75)), url('/images/lion.jpg');">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <h1 class="super-title text-5xl">Wild Beyond Blog</h1>
            <p class="mt-3 text-gray-200 max-w-2xl">Field stories, conservation reports, and ecosystem insights from across the wild.</p>
        </div>
    </section>

    <section class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" th:if="${not #lists.isEmpty(blogs)}">
            <article th:each="blog : ${blogs}" class="bg-white border border-gray-200 shadow hover:shadow-lg transition overflow-hidden">
                <img src="/images/lion.jpg" alt="Blog cover" class="w-full h-44 object-cover">
                <div class="p-5">
                    <p class="text-xs uppercase tracking-[0.16em] text-emerald-700"
                       th:text="${blog.createdAt != null ? #temporals.format(blog.createdAt, 'yyyy-MM-dd') : 'Latest'}">2026-01-01</p>
                    <h2 class="mt-2 text-xl font-bold text-emerald-950"><a th:href="@{/blog/{id}(id=${blog.id})}" th:text="${blog.title}" class="hover:underline">Blog title</a></h2>
                          <p class="mt-2 text-sm text-gray-600"><a th:href="@{/blog/{id}(id=${blog.id})}" th:text="${blog.content != null ? #strings.abbreviate(blog.content, 145) : 'Conservation update from the field.'}" class="hover:underline">Summary</a></p>
                    <a th:href="@{/blog/{id}(id=${blog.id})}" class="inline-block mt-4 text-sm font-semibold text-emerald-800 hover:underline">Read More</a>
                </div>
            </article>
        </div>

        <div class="bg-white border border-dashed border-gray-300 p-8 text-gray-600" th:if="${#lists.isEmpty(blogs)}">
            No published blog posts yet. Explore current highlights in the
            <a th:href="@{/explore}" class="font-semibold text-emerald-800 hover:underline">Explore page</a>.
        </div>
    </section>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
