<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | WildBeyond</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Titillium+Web:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { font-family: 'Titillium Web', sans-serif; }
        .super-title { font-family: 'Permanent Marker', cursive; }
        .brand-mark { font-family: 'Permanent Marker', cursive; letter-spacing: .02em; }
    </style>
</head>
<body class="bg-gray-100 text-gray-900 min-h-screen flex flex-col">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="flex-1 bg-cover bg-center"
      style="background-image: linear-gradient(rgba(2,6,23,.55), rgba(2,6,23,.65)), url('/images/lion.jpg');">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-14 md:py-20 flex justify-center">
        <section class="w-full max-w-lg bg-white/95 shadow-2xl border border-gray-200 p-8">
            <div class="text-center mb-7">
                <h1 class="super-title text-4xl text-gray-900">Join WildBeyond</h1>
                <p class="mt-2 text-sm text-gray-600">Create your account and start exploring</p>
            </div>

            <div th:if="${successMessage}" class="mb-4 border-l-4 border-emerald-700 bg-emerald-50 px-4 py-2 text-emerald-800 text-sm" th:text="${successMessage}"></div>
            <div th:if="${errorMessage}" class="mb-4 border-l-4 border-red-600 bg-red-50 px-4 py-2 text-red-800 text-sm" th:text="${errorMessage}"></div>

            <form th:action="@{/auth/register}" th:object="${registerForm}" method="post" class="space-y-4">
                <div>
                    <label for="name" class="block text-xs font-semibold uppercase tracking-[.12em] text-gray-600 mb-1">Full Name</label>
                    <input id="name" th:field="*{name}" type="text" required placeholder="Jane Wildhart"
                           class="w-full border border-gray-300 px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-emerald-700/30 focus:border-emerald-700">
                    <span th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="text-xs text-red-700 mt-1 block"></span>
                </div>

                <div>
                    <label for="email" class="block text-xs font-semibold uppercase tracking-[.12em] text-gray-600 mb-1">Email</label>
                    <input id="email" th:field="*{email}" type="email" required placeholder="you@wildbeyond.com"
                           class="w-full border border-gray-300 px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-emerald-700/30 focus:border-emerald-700">
                    <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="text-xs text-red-700 mt-1 block"></span>
                </div>

                <div>
                    <label for="password" class="block text-xs font-semibold uppercase tracking-[.12em] text-gray-600 mb-1">Password</label>
                    <input id="password" th:field="*{password}" type="password" required placeholder="Minimum 8 characters"
                           class="w-full border border-gray-300 px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-emerald-700/30 focus:border-emerald-700">
                    <p class="text-xs text-gray-500 mt-1">Use at least 8 characters with mixed letters and numbers.</p>
                    <span th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="text-xs text-red-700 mt-1 block"></span>
                </div>

                <div>
                    <label for="role" class="block text-xs font-semibold uppercase tracking-[.12em] text-gray-600 mb-1">Role</label>
                    <select id="role" th:field="*{role}" required
                            class="w-full border border-gray-300 px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-emerald-700/30 focus:border-emerald-700 bg-white">
                        <option value="">— Choose your role —</option>
                        <option value="BUYER">Buyer — explore and purchase wildlife goods</option>
                        <option value="SELLER">Seller — list and sell products</option>
                        <option value="ADMIN">Admin — platform administration</option>
                    </select>
                    <span th:if="${#fields.hasErrors('role')}" th:errors="*{role}" class="text-xs text-red-700 mt-1 block"></span>
                </div>

                <button type="submit" class="w-full bg-emerald-900 text-white py-2.5 font-semibold hover:bg-emerald-800 transition">Create Account</button>
            </form>

            <p class="mt-6 text-sm text-center text-gray-700">
                Already have an account?
                <a th:href="@{/auth/login}" class="text-emerald-800 font-semibold hover:underline">Sign in</a>
            </p>
        </section>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
