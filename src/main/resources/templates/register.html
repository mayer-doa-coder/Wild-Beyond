<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — Wild Beyond</title>
</head>
<body>

    <h1>Wild Beyond — Create Account</h1>

    <!--
        th:object="${registerForm}" binds to the UserRegistrationDTO
        added to the model by AuthController.showRegisterPage().

        th:action uses @{} to let Thymeleaf inject the CSRF token.
        POST /auth/register will be handled by AuthController on Day-4.
    -->
    <form th:action="@{/auth/register}" th:object="${registerForm}" method="post">

        <div>
            <label for="name">Full Name</label>
            <input type="text" id="name" th:field="*{name}"
                   placeholder="Your full name" required />
            <!-- Validation error display (Day-4) -->
            <span th:if="${#fields.hasErrors('name')}"
                  th:errors="*{name}" style="color:red;"></span>
        </div>

        <div>
            <label for="email">Email</label>
            <input type="email" id="email" th:field="*{email}"
                   placeholder="you@example.com" required />
            <span th:if="${#fields.hasErrors('email')}"
                  th:errors="*{email}" style="color:red;"></span>
        </div>

        <div>
            <label for="password">Password</label>
            <!--
                th:field binds to the DTO field but uses type="password".
                The @JsonProperty(WRITE_ONLY) on the DTO ensures this
                field is never accidentally serialized in a response.
            -->
            <input type="password" id="password" th:field="*{password}"
                   placeholder="Minimum 8 characters" required />
            <span th:if="${#fields.hasErrors('password')}"
                  th:errors="*{password}" style="color:red;"></span>
        </div>

        <!--
            Role selection: SELLER or BUYER only.
            ADMIN accounts are created only by existing admins — never via this form.
        -->
        <div>
            <label>I want to:</label>
            <label>
                <input type="radio" th:field="*{role}" value="BUYER" /> Buy products
            </label>
            <label>
                <input type="radio" th:field="*{role}" value="SELLER" /> Sell products
            </label>
            <span th:if="${#fields.hasErrors('role')}"
                  th:errors="*{role}" style="color:red;"></span>
        </div>

        <button type="submit">Create Account</button>

    </form>

    <p>Already have an account? <a th:href="@{/auth/login}">Log in here</a></p>

</body>
</html>
