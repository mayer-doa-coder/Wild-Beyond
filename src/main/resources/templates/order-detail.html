<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Details - Wild Beyond</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Titillium+Web:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { font-family: 'Titillium Web', sans-serif; }
        .super-title { font-family: 'Permanent Marker', cursive; }
        .brand-mark { font-family: 'Permanent Marker', cursive; letter-spacing: .02em; }
    </style>
</head>
<body class="bg-gray-100 text-gray-900 min-h-screen flex flex-col">
<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="flex-1 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
    <div class="bg-white border border-gray-200 shadow overflow-hidden">
        <div class="bg-emerald-950 text-white px-6 py-4">
            <h1 class="text-2xl font-bold">Order Details</h1>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-3 px-6 py-5 border-b border-gray-100 text-sm">
            <p><strong>Order ID:</strong> <span th:text="${order.id}">1</span></p>
            <p><strong>Order Date:</strong> <span th:text="${#temporals.format(order.orderDate, 'yyyy-MM-dd HH:mm')}">2026-01-01 10:00</span></p>
            <p>
                <strong>Status:</strong>
                <span class="inline-block px-2 py-0.5 rounded-full border text-xs font-semibold"
                      th:classappend="${order.status == 'PENDING' ? ' bg-amber-50 text-amber-700 border-amber-200' : (order.status == 'COMPLETED' ? ' bg-emerald-50 text-emerald-700 border-emerald-200' : ' bg-red-50 text-red-700 border-red-200')}"
                      th:text="${order.status}">PENDING</span>
            </p>
            <p><strong>Items:</strong> <span th:text="${#lists.size(order.items)}">1</span></p>
        </div>

        <div class="p-6">
            <table class="w-full border-collapse">
                <thead>
                <tr class="bg-gray-50 text-gray-600 text-xs uppercase tracking-[0.14em]">
                    <th class="text-left px-3 py-2">Product</th>
                    <th class="text-right px-3 py-2">Quantity</th>
                    <th class="text-right px-3 py-2">Unit Price</th>
                    <th class="text-right px-3 py-2">Line Total</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="item : ${order.items}" class="border-t border-gray-100">
                    <td class="px-3 py-2" th:text="${item.productName}">Product Name</td>
                    <td class="px-3 py-2 text-right" th:text="${item.quantity}">1</td>
                    <td class="px-3 py-2 text-right" th:text="${'$' + #numbers.formatDecimal(item.unitPrice, 1, 2)}">$0.00</td>
                    <td class="px-3 py-2 text-right" th:text="${'$' + #numbers.formatDecimal(item.unitPrice * item.quantity, 1, 2)}">$0.00</td>
                </tr>
                </tbody>
            </table>

            <p class="mt-4 text-right text-lg font-bold text-emerald-800">Total: <span th:text="${'$' + #numbers.formatDecimal(order.totalPrice, 1, 2)}">$0.00</span></p>
            <div class="mt-5">
                <a th:href="@{/orders}" class="inline-block bg-emerald-900 text-white px-4 py-2 text-sm font-semibold hover:bg-emerald-800 transition">Back to Orders</a>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
