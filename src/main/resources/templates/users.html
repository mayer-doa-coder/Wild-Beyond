<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users - Wild Beyond</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Titillium+Web:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { font-family: 'Titillium Web', sans-serif; }
        .super-title { font-family: 'Permanent Marker', cursive; }
        .brand-mark { font-family: 'Permanent Marker', cursive; letter-spacing: .02em; }
    </style>
</head>
<body class="bg-gray-100 text-gray-900 min-h-screen flex flex-col">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="flex-1">
    <section class="relative py-14 text-white bg-cover bg-center"
             style="background-image: linear-gradient(rgba(2,6,23,.55), rgba(2,6,23,.75)), url('/images/lion.jpg');">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <h1 class="super-title text-5xl">User Management</h1>
            <p class="mt-3 text-gray-200 max-w-2xl">Admin console for reviewing account status and role assignments.</p>
        </div>
    </section>

    <section class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 mb-6">
            <article class="bg-white border border-gray-200 shadow p-4">
                <p class="text-xs uppercase tracking-[0.16em] text-gray-500">Total Users</p>
                <p class="mt-2 text-3xl font-bold text-emerald-900" th:text="${#lists.size(users)}">0</p>
            </article>
            <article class="bg-white border border-gray-200 shadow p-4">
                <p class="text-xs uppercase tracking-[0.16em] text-gray-500">Enabled</p>
                <p class="mt-2 text-3xl font-bold text-emerald-900" th:text="${#lists.size(users.?[enabled])}">0</p>
            </article>
            <article class="bg-white border border-gray-200 shadow p-4">
                <p class="text-xs uppercase tracking-[0.16em] text-gray-500">Disabled</p>
                <p class="mt-2 text-3xl font-bold text-amber-700" th:text="${#lists.size(users) - #lists.size(users.?[enabled])}">0</p>
            </article>
        </div>

        <div class="bg-white border border-dashed border-gray-300 p-8 text-gray-600" th:if="${#lists.isEmpty(users)}">
            No users found.
        </div>

        <div class="bg-white border border-gray-200 shadow overflow-hidden" th:if="${not #lists.isEmpty(users)}">
            <table class="w-full border-collapse">
                <thead>
                <tr class="bg-emerald-50 text-emerald-900 text-xs uppercase tracking-[0.14em]">
                    <th class="text-left px-4 py-3">ID</th>
                    <th class="text-left px-4 py-3">Name</th>
                    <th class="text-left px-4 py-3">Email</th>
                    <th class="text-left px-4 py-3">Enabled</th>
                    <th class="text-left px-4 py-3">Roles</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="u : ${users}" class="border-t border-gray-100">
                    <td class="px-4 py-3" th:text="${u.id}">1</td>
                    <td class="px-4 py-3" th:text="${u.name}">User</td>
                    <td class="px-4 py-3" th:text="${u.email}">user@example.com</td>
                    <td class="px-4 py-3">
                        <span class="inline-block px-2 py-0.5 rounded-full border text-xs font-semibold"
                              th:classappend="${u.enabled} ? ' bg-emerald-50 text-emerald-700 border-emerald-200' : ' bg-red-50 text-red-700 border-red-200'"
                              th:text="${u.enabled} ? 'YES' : 'NO'">YES</span>
                    </td>
                    <td class="px-4 py-3 font-semibold text-emerald-800" th:text="${#strings.listJoin(u.roles.![name], ', ')}">BUYER</td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
