<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wildlife Photography | Wild Beyond</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Titillium+Web:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { font-family: 'Titillium Web', sans-serif; }
        .super-title { font-family: 'Permanent Marker', cursive; }
        .brand-mark { font-family: 'Permanent Marker', cursive; letter-spacing: .02em; }
    </style>
</head>
<body class="bg-slate-100 text-slate-900 min-h-screen flex flex-col">
<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="flex-1">
    <section class="relative py-16 text-white bg-cover bg-center"
             style="background-image: linear-gradient(rgba(2,6,23,.55), rgba(2,6,23,.75)), url('/images/deer-hero.jpg');">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <h1 class="super-title text-5xl">Wildlife Photography</h1>
            <p class="mt-3 text-gray-200 max-w-3xl">A curated gallery of field captures with photographer ownership, location context, and ecological story notes.</p>
            <a th:href="@{/explore}" class="inline-block mt-4 text-sm font-semibold text-yellow-300 hover:underline">&larr; Back To Explore</a>
        </div>
    </section>

    <section class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <article th:each="photo : ${photos}" class="bg-white border border-slate-200 shadow overflow-hidden">
                <button type="button"
                        class="photo-zoom-trigger block w-full focus:outline-none focus:ring-2 focus:ring-emerald-600"
                        th:attr="data-image=${photo.imageUrl},data-title=${photo.title},data-owner=${photo.ownerName},data-location=${photo.location}">
                    <img th:src="${photo.imageUrl}" th:alt="${photo.title}" class="w-full h-auto max-h-80 object-contain bg-slate-100 cursor-zoom-in"
                         onerror="this.onerror=null;this.src='/images/lion.jpg';">
                </button>
                <div class="p-5">
                    <h2 class="text-xl font-bold text-emerald-900" th:text="${photo.title}">Photo Title</h2>
                    <p class="text-sm text-slate-600 mt-1" th:text="${'Photographer: ' + photo.ownerName}">Photographer: Name</p>
                    <p class="text-sm text-slate-600" th:text="${'Location: ' + photo.location}">Location: Place</p>
                    <p class="mt-3 text-slate-700 leading-relaxed" th:text="${photo.detail}">Details</p>
                    <div class="mt-4 flex items-center justify-between gap-2">
                        <button type="button"
                                class="photo-zoom-trigger inline-flex items-center px-3 py-1.5 text-sm font-semibold text-emerald-900 border border-emerald-700 hover:bg-emerald-50 transition"
                                th:attr="data-image=${photo.imageUrl},data-title=${photo.title},data-owner=${photo.ownerName},data-location=${photo.location}">
                            Zoom Photo
                        </button>
                        <a th:href="${photo.imageUrl}" target="_blank" rel="noopener noreferrer"
                           class="inline-flex items-center px-3 py-1.5 text-sm font-semibold text-white bg-emerald-700 hover:bg-emerald-600 transition">
                            Open Original
                        </a>
                    </div>
                </div>
            </article>
        </div>
    </section>
</main>

<div id="photo-lightbox" class="fixed inset-0 z-[70] hidden items-center justify-center bg-black/90 p-4" role="dialog" aria-modal="true" aria-label="Wildlife photo viewer">
    <button id="photo-lightbox-close" type="button" class="absolute top-4 right-4 px-3 py-1.5 text-sm font-semibold bg-white text-slate-900 hover:bg-slate-200 transition">Close</button>
    <div class="w-full max-w-6xl">
        <img id="photo-lightbox-image" src="" alt="Zoomed wildlife photo" class="w-full max-h-[80vh] object-contain bg-black/40 border border-white/20">
        <div class="mt-4 flex flex-col md:flex-row md:items-center md:justify-between gap-4 text-white">
            <div>
                <h3 id="photo-lightbox-title" class="text-2xl font-semibold">Photo title</h3>
                <p id="photo-lightbox-meta" class="text-sm text-slate-200">Photographer and location</p>
            </div>
            <a id="photo-lightbox-download" href="#" target="_blank" rel="noopener noreferrer"
               class="inline-flex items-center justify-center px-4 py-2 font-semibold bg-yellow-400 text-black hover:bg-yellow-300 transition">
                Open / Download Full Photo
            </a>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        const lightbox = document.getElementById('photo-lightbox');
        const closeButton = document.getElementById('photo-lightbox-close');
        const imageEl = document.getElementById('photo-lightbox-image');
        const titleEl = document.getElementById('photo-lightbox-title');
        const metaEl = document.getElementById('photo-lightbox-meta');
        const downloadEl = document.getElementById('photo-lightbox-download');
        const triggers = document.querySelectorAll('.photo-zoom-trigger');

        function closeLightbox() {
            lightbox.classList.add('hidden');
            lightbox.classList.remove('flex');
            document.body.classList.remove('overflow-hidden');
        }

        function openLightbox(trigger) {
            const image = trigger.getAttribute('data-image') || '/images/lion.jpg';
            const title = trigger.getAttribute('data-title') || 'Wildlife Photo';
            const owner = trigger.getAttribute('data-owner') || 'Unknown';
            const location = trigger.getAttribute('data-location') || 'Unknown location';

            imageEl.src = image;
            titleEl.textContent = title;
            metaEl.textContent = 'Photographer: ' + owner + ' | Location: ' + location;
            downloadEl.href = image;

            lightbox.classList.remove('hidden');
            lightbox.classList.add('flex');
            document.body.classList.add('overflow-hidden');
        }

        triggers.forEach(function (trigger) {
            trigger.addEventListener('click', function () {
                openLightbox(trigger);
            });
        });

        if (closeButton) {
            closeButton.addEventListener('click', closeLightbox);
        }

        if (lightbox) {
            lightbox.addEventListener('click', function (event) {
                if (event.target === lightbox) {
                    closeLightbox();
                }
            });
        }

        document.addEventListener('keydown', function (event) {
            if (event.key === 'Escape' && lightbox && !lightbox.classList.contains('hidden')) {
                closeLightbox();
            }
        });
    });
</script>
</body>
</html>
