<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buyer Dashboard | WildBeyond</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Titillium+Web:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { font-family: 'Titillium Web', sans-serif; }
        .super-title { font-family: 'Permanent Marker', cursive; }
        .brand-mark { font-family: 'Permanent Marker', cursive; letter-spacing: .02em; }
    </style>
</head>
<body class="bg-gray-100 text-gray-900 min-h-screen flex flex-col">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="flex-1">
    <section class="relative py-14 text-white bg-cover bg-center"
             style="background-image: linear-gradient(rgba(2,6,23,.55), rgba(2,6,23,.75)), url('/images/lion.jpg');">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex items-center justify-between gap-4">
            <div>
                <h1 class="super-title text-5xl">Buyer Dashboard</h1>
                <p class="mt-2 text-gray-200">Track your orders and discover new products.</p>
            </div>
            <span class="px-3 py-1 border border-emerald-300 text-emerald-100 text-sm font-semibold">Buyer</span>
        </div>
    </section>

    <section class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
        <div class="grid grid-cols-1 sm:grid-cols-1 gap-6 mb-10">
            <article class="bg-white border border-gray-200 shadow p-5"><h3 class="text-xs uppercase tracking-[.14em] text-gray-500">My Orders</h3><p class="mt-3 text-4xl font-bold text-emerald-900" th:text="${myOrders}">0</p></article>
        </div>

        <section class="mb-10" th:if="${not #lists.isEmpty(recentOrders)}">
            <h2 class="super-title text-3xl mb-5">Recent Purchases</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <a th:each="order : ${recentOrders}" th:href="@{/buyer/orders/{id}(id=${order.id})}" class="bg-white border border-gray-200 shadow p-5 hover:shadow-lg transition">
                    <p class="font-semibold" th:text="${'Order #' + order.id}">Order #1</p>
                    <p class="text-sm text-gray-600 mt-1" th:text="${#temporals.format(order.orderDate, 'yyyy-MM-dd HH:mm')}">2026-01-01 10:00</p>
                    <p class="text-sm text-emerald-800 font-semibold mt-2" th:text="${'$' + #numbers.formatDecimal(order.totalPrice, 1, 2)}">$0.00</p>
                </a>
            </div>
        </section>

        <h2 class="super-title text-3xl mb-5">Quick Actions</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
            <a th:href="@{/buyer/products}" class="bg-white border border-gray-200 shadow p-5 hover:shadow-lg transition">
                <p class="font-semibold">Browse Products</p>
                <p class="text-sm text-gray-600 mt-1">Discover wildlife conservation products</p>
            </a>
            <a th:href="@{/buyer/orders}" class="bg-white border border-gray-200 shadow p-5 hover:shadow-lg transition">
                <p class="font-semibold">My Orders</p>
                <p class="text-sm text-gray-600 mt-1">Track your order history</p>
            </a>
        </div>
    </section>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
