<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error | Wild Beyond</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Titillium+Web:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { font-family: 'Titillium Web', sans-serif; }
        .super-title { font-family: 'Permanent Marker', cursive; }
        .brand-mark { font-family: 'Permanent Marker', cursive; letter-spacing: .02em; }
    </style>
</head>
<body class="bg-gray-100 text-gray-900 min-h-screen flex flex-col">
<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="flex-1 max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-14">
    <div class="bg-white border border-gray-200 shadow p-8 text-center">
        <h1 class="super-title text-5xl text-emerald-950">Something went wrong</h1>
        <p class="mt-4 text-gray-600" th:text="${error ?: 'The requested page could not be loaded.'}">The requested page could not be loaded.</p>
        <p class="mt-2 text-sm text-gray-500">Status: <span th:text="${status ?: 500}">500</span></p>
        <div class="mt-8 flex justify-center gap-3">
            <a th:href="@{/}" class="bg-emerald-900 text-white px-5 py-2.5 text-sm font-semibold hover:bg-emerald-800 transition">Go to Homepage</a>
            <a th:href="@{/products}" class="bg-slate-700 text-white px-5 py-2.5 text-sm font-semibold hover:bg-slate-600 transition">Open Marketplace</a>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
