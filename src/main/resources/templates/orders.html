<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders - Wild Beyond</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Titillium+Web:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { font-family: 'Titillium Web', sans-serif; }
        .super-title { font-family: 'Permanent Marker', cursive; }
        .brand-mark { font-family: 'Permanent Marker', cursive; letter-spacing: .02em; }
    </style>
</head>
<body class="bg-gray-100 text-gray-900 min-h-screen flex flex-col">
<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="flex-1 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
    <div class="flex flex-wrap items-center justify-between gap-4 mb-6">
        <h1 class="text-3xl font-bold text-emerald-950">My Orders</h1>
        <a th:href="@{/cart}" class="text-sm font-semibold text-emerald-800 hover:underline">Cart</a>
    </div>

    <div class="mb-6 flex flex-wrap gap-2" th:if="${#authorization.expression('hasRole(''SELLER'')')}">
        <a th:href="@{/orders(view='buying')}"
           class="px-4 py-2 text-sm font-semibold border"
           th:classappend="${ordersView == 'buying'} ? ' bg-emerald-900 text-white border-emerald-900' : ' bg-white text-emerald-900 border-emerald-300'">Buying Orders</a>
        <a th:href="@{/orders(view='selling')}"
           class="px-4 py-2 text-sm font-semibold border"
           th:classappend="${ordersView == 'selling'} ? ' bg-emerald-900 text-white border-emerald-900' : ' bg-white text-emerald-900 border-emerald-300'">My Product Orders</a>
    </div>

    <div class="bg-white border border-dashed border-gray-300 p-8 text-gray-600" th:if="${#lists.isEmpty(orders)}">
        No orders yet. <a th:href="@{/products}" class="font-semibold text-emerald-800 hover:underline">Browse products</a> to place your first order.
    </div>

    <div class="bg-white border border-gray-200 shadow overflow-hidden" th:if="${not #lists.isEmpty(orders)}">
        <table class="w-full border-collapse">
            <thead>
            <tr class="bg-emerald-50 text-emerald-900 text-xs uppercase tracking-[0.14em]">
                <th class="text-left px-4 py-3">ID</th>
                <th class="text-left px-4 py-3">Date</th>
                <th class="text-left px-4 py-3">Status</th>
                <th class="text-left px-4 py-3">Total</th>
                <th class="text-left px-4 py-3">Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="order : ${orders}" class="border-t border-gray-100">
                <td class="px-4 py-3" th:text="${order.id}">1</td>
                <td class="px-4 py-3" th:text="${#temporals.format(order.orderDate, 'yyyy-MM-dd HH:mm')}">2026-01-01 10:00</td>
                <td class="px-4 py-3 font-semibold text-emerald-800" th:text="${order.status}">PENDING</td>
                <td class="px-4 py-3" th:text="${'$' + #numbers.formatDecimal(order.totalPrice, 1, 2)}">$0.00</td>
                <td class="px-4 py-3">
                    <a th:href="@{/orders/{id}(id=${order.id})}" class="font-semibold text-emerald-800 hover:underline">View Details</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
