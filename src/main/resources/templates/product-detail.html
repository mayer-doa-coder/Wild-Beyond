<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Detail - Wild Beyond</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; min-height: 100vh; background: #f4f6f8; color: #1a1a1a; }
        header { background: #1b3a0d; padding: 0 2rem; min-height: 64px; display: flex; align-items: center; justify-content: space-between; }
        .nav-brand { font-size: 1.4rem; font-weight: 800; color: #fff; text-decoration: none; }
        .nav-brand span { color: rgba(160,220,100,.85); }
        .hdr-links { display: flex; align-items: center; gap: .7rem; }
        .hdr-links a { color: rgba(255,255,255,.9); text-decoration: none; border: 1px solid rgba(255,255,255,.25); border-radius: 2px; padding: .35rem .75rem; font-size: .84rem; }
        .hdr-links a:hover { background: rgba(255,255,255,.12); }
        main { max-width: 860px; margin: 2rem auto; padding: 0 1.25rem; }
        .card { background: #fff; border-radius: 8px; box-shadow: 0 2px 10px rgba(0,0,0,.08); overflow: hidden; }
        .head { background: #eef3ec; padding: 1rem 1.25rem; border-bottom: 1px solid #dbe4d7; }
        .head h1 { color: #1b3a0d; font-size: 1.6rem; }
        .body { padding: 1.25rem; }
        .price { color: #1b3a0d; font-size: 1.35rem; font-weight: 800; margin-bottom: .8rem; }
        .meta { color: #5e6a5a; font-size: .93rem; margin-bottom: .75rem; }
        .desc { color: #2c2c2c; line-height: 1.6; }
    </style>
</head>
<body>
<header>
    <a class="nav-brand" th:href="@{/products}">Wild<span>Beyond</span></a>
    <div class="hdr-links">
        <a th:href="@{/products}">Back to Products</a>
        <a th:href="@{/dashboard}">Dashboard</a>
    </div>
</header>

<main>
    <div class="card">
        <div class="head">
            <h1 th:text="${product.name}">Product Name</h1>
        </div>
        <div class="body">
            <p class="price" th:text="${'$' + #numbers.formatDecimal(product.price, 1, 2)}">$0.00</p>
            <p class="meta" th:text="${'Stock: ' + product.stock}">Stock: 0</p>
            <p class="desc" th:text="${product.description != null ? product.description : 'No description available.'}">Description</p>

            <div style="margin-top: 1rem; display: flex; gap: .6rem;" th:if="${canManageProduct}">
                <a th:href="@{/products/edit/{id}(id=${product.id})}"
                   style="display: inline-block; text-decoration: none; background: #b7791f; color: #fff; padding: .5rem .9rem; font-size: .88rem; border-radius: 3px; font-weight: 700;">
                    Edit
                </a>
                <a th:href="@{/products/delete/{id}(id=${product.id})}"
                   onclick="return confirm('Delete this product?')"
                   style="display: inline-block; text-decoration: none; background: #b42318; color: #fff; padding: .5rem .9rem; font-size: .88rem; border-radius: 3px; font-weight: 700;">
                    Delete
                </a>
            </div>
        </div>
    </div>
</main>
</body>
</html>
