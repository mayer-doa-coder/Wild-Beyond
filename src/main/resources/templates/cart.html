<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart | Wild Beyond</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Titillium+Web:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { font-family: 'Titillium Web', sans-serif; }
        .super-title { font-family: 'Permanent Marker', cursive; }
        .brand-mark { font-family: 'Permanent Marker', cursive; letter-spacing: .02em; }
    </style>
</head>
<body class="bg-gray-100 text-gray-900 min-h-screen flex flex-col">
<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="flex-1 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
    <h1 class="text-3xl font-bold text-emerald-950 mb-6">Cart</h1>

    <div class="bg-white border border-dashed border-gray-300 p-8 text-gray-600" th:if="${#lists.isEmpty(cartItems)}">
        Your cart is empty. <a th:href="@{/products}" class="font-semibold text-emerald-800 hover:underline">Browse products</a> to add items.
    </div>

    <div th:if="${not #lists.isEmpty(cartItems)}" class="space-y-4">
        <article th:each="item : ${cartItems}" class="bg-white border border-gray-200 shadow p-4 grid grid-cols-1 md:grid-cols-[120px_1fr_auto] gap-4 items-center">
            <img th:if="${item.imageAvailable}" th:src="@{/products/{id}/photo(id=${item.productId})}" alt="Product image" class="w-full h-24 object-cover border border-gray-200">
            <img th:if="${!item.imageAvailable}" src="/images/lion.jpg" alt="Product image" class="w-full h-24 object-cover border border-gray-200">
            <div>
                <h2 class="font-semibold text-lg" th:text="${item.productName}">Product Name</h2>
                <p class="text-sm text-gray-600" th:text="${'Qty: ' + item.quantity + ' x $' + #numbers.formatDecimal(item.unitPrice, 1, 2)}">Qty and Price</p>
                <p class="mt-1 text-emerald-800 font-semibold" th:text="${'$' + #numbers.formatDecimal(item.lineTotal, 1, 2)}">$0.00</p>
            </div>
            <form th:action="@{/cart/remove/{id}(id=${item.productId})}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <button type="submit" class="bg-red-700 text-white px-4 py-2 text-sm font-semibold hover:bg-red-600 transition">Remove</button>
            </form>
        </article>

        <div class="bg-white border border-gray-200 shadow p-5 flex flex-wrap items-center justify-between gap-4">
            <p class="text-xl font-bold text-emerald-900">Total: <span th:text="${'$' + #numbers.formatDecimal(cartTotal, 1, 2)}">$0.00</span></p>
            <div class="flex gap-3">
                <a th:href="@{/products}" class="bg-slate-700 text-white px-4 py-2 text-sm font-semibold hover:bg-slate-600 transition">Continue Shopping</a>
                <form th:action="@{/cart/checkout}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <button type="submit" class="bg-emerald-900 text-white px-4 py-2 text-sm font-semibold hover:bg-emerald-800 transition">Proceed to Checkout</button>
                </form>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
