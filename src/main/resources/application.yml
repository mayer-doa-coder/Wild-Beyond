spring:
  application:
    name: Wild-Beyond

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:wild_beyond}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  thymeleaf:
    cache: false

server:
  port: 8080

logging:
  file:
    name: ${LOG_PATH:./app.log}
  level:
    root: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.tool.schema: DEBUG

