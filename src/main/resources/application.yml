spring:
  application:
    name: Wild-Beyond

  profiles:
    active: dev

  jpa:
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  thymeleaf:
    cache: false

app:
  admin:
    email: ${APP_ADMIN_EMAIL}
    password: ${APP_ADMIN_PASSWORD}
  security:
    require-https: false
    auth:
      lockout:
        max-failed-attempts: 5
        lock-duration-minutes: 15
    rate-limit:
      enabled: true
      login:
        capacity: 5
        refill-minutes: 1
      api:
        capacity: 100
        refill-minutes: 1

server:
  port: 8080

logging:
  file:
    name: ${LOG_PATH:./app.log}
  level:
    root: INFO

