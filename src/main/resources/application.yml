spring:
  application:
    name: Wild-Beyond

  datasource:
    url: ${SPRING_DATASOURCE_URL:${JDBC_DATABASE_URL:jdbc:${DATABASE_URL:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:wild_beyond}}}}
    username: ${SPRING_DATASOURCE_USERNAME:${DB_USERNAME:postgres}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:postgres}}
    driver-class-name: org.postgresql.Driver
    hikari:
      auto-commit: false

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  thymeleaf:
    cache: false

external:
  blog:
    request-timeout-seconds: 8

server:
  port: ${PORT:8080}
  servlet:
    session:
      timeout: 30m

logging:
  file:
    name: ${LOG_PATH:./app.log}
  level:
    root: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.tool.schema: DEBUG

