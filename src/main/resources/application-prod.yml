spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  flyway:
    baseline-on-migrate: true

  servlet:
    session:
      cookie:
        http-only: true
        secure: true
        same-site: strict

logging:
  level:
    org.hibernate.SQL: WARN
    org.hibernate.tool.schema: WARN

jwt:
  secret: ${JWT_SECRET}

server:
  forward-headers-strategy: framework

app:
  security:
    require-https: true
