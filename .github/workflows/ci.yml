name: Wild Beyond CI

on:
  push:
    branches:
      - dev
      - main
      - feature/**
  pull_request:
    branches:
      - dev
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Grant execute permission for Maven wrapper
        run: chmod +x mvnw

      - name: Build Project
        run: ./mvnw clean install -DskipTests

      - name: Run Tests
        run: ./mvnw test
        # Tests use H2 in-memory DB (src/test/resources/application.yml)
        # No external PostgreSQL service required

      - name: Build Docker Image
        run: docker build -t wild-beyond-app .

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/
          retention-days: 7

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Trigger Render deploy hook
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK" ]; then
            echo "RENDER_DEPLOY_HOOK secret is not set."
            exit 1
          fi
          curl --fail --silent --show-error --request POST "$RENDER_DEPLOY_HOOK"

      - name: Deployment not triggered for this event
        if: github.event_name != 'push' || (github.ref != 'refs/heads/main' && github.ref != 'refs/heads/dev')
        run: |
          echo "Deployment policy skip for event=${{ github.event_name }} ref=${{ github.ref }}"
