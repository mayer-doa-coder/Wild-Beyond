name: Wild Beyond CI

on:
  push:
    branches:
      - dev
      - feature/*
  pull_request:
    branches:
      - dev

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Grant execute permission for Maven wrapper
        run: chmod +x mvnw

      - name: Build Project
        run: ./mvnw clean install -DskipTests

      - name: Run Tests
        run: ./mvnw test
        # Tests use H2 in-memory DB (src/test/resources/application.yml)
        # No external PostgreSQL service required

      - name: Build Docker Image
        run: docker build -t wild-beyond-app .

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/
          retention-days: 7
